x-otel-common-env: &otel-common-env
  # OTEL_SERVICE_NAMEはserviceごとに設定が必要
  # base
  OTEL_SDK_DISABLED: "false"
  OTEL_PHP_AUTOLOAD_ENABLED: "true"
  OTEL_PROPAGATORS: baggage,tracecontext
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,service.version=dummy
  # log, metrics, trace export
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: http://otel-collector:4318/v1/logs
  OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: http://otel-collector:4318/v1/metrics
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
  OTEL_LOGS_EXPORTER: none
  OTEL_METRICS_EXPORTER: otlp
  OTEL_TRACES_EXPORTER: otlp
  OTEL_METRIC_EXPORT_INTERVAL: 5000
  # debug
  # OTEL_LOG_LEVEL: debug

services:
  ##################################################
  # Laravel - MySQL
  ##################################################
  # laravel:
  #   image: laravel-local-example:latest
  #   build:
  #     context: ./laravel
  #   command: >
  #     bash -c "
  #       php artisan migrate \\
  #       && php artisan serve --host=0.0.0.0
  #     "
  #   environment:
  #     DB_CONNECTION: mysql
  #     DB_HOST: mysql
  #     DB_DATABASE: laravel
  #     DB_USERNAME: root
  #     DB_PASSWORD: password
  #   labels:
  #     prometheus_target: laravel
  #   ports:
  #     - "8000:8000"
  #   restart: always
  #   volumes:
  #     - ./laravel:/opt/laravel
  #   depends_on:
  #     - mysql

  mysql:
    image: mysql:8.0.44
    command:
      - "mysqld"
      - "--sql-mode="
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: password
    healthcheck:
      test:
        - "CMD-SHELL"
        - "mysqladmin ping -ppassword | grep 'mysqld is alive'"
      retries: 30
      timeout: 2s
    labels:
      prometheus_target: mysql
    restart: always
    volumes:
      - ./.local/mysql/data:/var/lib/mysql
      - ./.local/mysql/log:/var/log/mysql

  ##################################################
  # Grafana (ダッシュボード)
  ##################################################
  grafana:
    image: grafana/grafana:latest
    user: root
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: password
    ports:
      - "3000:3000"
    restart: always
    volumes:
      - ./.local/grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  ##################################################
  # OTEL Collector (テレメトリデータの中継)
  ##################################################
  otel-collector:
    image: otel/opentelemetry-collector:latest
    command:
      - "--config=/etc/otelcol/config.yaml"
    restart: always
    volumes:
      - ./otel/config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      - prometheus
      - tempo

  ##################################################
  # Prometheus (メトリクスの保存)
  ##################################################
  prometheus:
    image: prom/prometheus:latest
    user: root
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
    ports:
      - "9090:9090"
    restart: always
    volumes:
      - ./.local/prometheus/data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  ##################################################
  # Prometheus (トレースの保存)
  ##################################################
  tempo:
    image: grafana/tempo:latest
    command:
      - "-config.file=/etc/tempo.yaml"
    restart: always
    volumes:
      - ./.local/tempo/data:/tmp/tempo
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
